<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curando o Incurável — Linha do Tempo Probatória</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 28px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin-top: 10px;
      color: #d1d5db;
    }

    main {
      max-width: 1050px;
      margin: auto;
      padding: 20px;
    }

    .calendar-wrapper {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .month {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .month h2 {
      margin-top: 0;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .label {
      font-weight: bold;
      color: #6b7280;
      text-align: center;
      font-size: 13px;
    }

    .day {
      background: #e5e7eb;
      padding: 10px 0;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
    }

    .day:hover {
      outline: 2px solid #2563eb;
    }

    .day.event {
      background: #111827;
      color: white;
      font-weight: bold;
    }

    .panel {
      margin-top: 24px;
      background: white;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .event-card {
      border-left: 5px solid #111827;
      background: #f9fafb;
      border-radius: 10px;
      padding: 14px;
      margin: 14px 0;
    }

    .tag {
      display: inline-block;
      background: #e5e7eb;
      color: #374151;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    a {
      color: #2563eb;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .small {
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>Curando o Incurável</h1>
  <p>Linha do tempo probatória — fatos, documentos, provas e impactos</p>
</header>

<main>

  <section class="calendar-wrapper" id="calendar"></section>

  <section class="panel" id="details">
    <h2>Selecione uma data</h2>
    <p>Clique em um dia marcado no calendário para visualizar os eventos, provas vinculadas e observações.</p>
  </section>

</main>

<script>
const eventos = [
  {
    date: "2026-04-07",
    time: "19:00",
    title: "Plantão noturno na UPA Itaipu",
    category: "Comparecimento / escala",
    description: "Registro relacionado ao plantão noturno e à presença na unidade no período indicado.",
    impact: "Ajuda a contextualizar a cronologia dos fatos e a distinção entre o plantão recebido e o plantão anterior.",
    proofs: [
      {
        title: "Print do grupo UPA médicos/gestores",
        path: "Linha do tempo principal/IMG_4499.heic"
      },
      {
        title: "Petição-adendo com prints anexos",
        path: "Linha do tempo principal/petição-adendo-delyone-de-paula-canedo-filho.pdf"
      }
    ]
  },
  {
    date: "2026-04-17",
    time: "",
    title: "Tramitação administrativa sem ciência formal imediata",
    category: "Ocultação procedimental / ausência de ciência",
    description: "Registro de tramitação administrativa sob restrição de acesso, sem comunicação formal tempestiva ao interessado.",
    impact: "Pode demonstrar prejuízo à ciência formal, à compreensão dos fatos e ao exercício tempestivo de defesa administrativa.",
    proofs: [
      {
        title: "Petição-adendo — comunicação ao juízo",
        path: "Linha do tempo principal/petição-adendo-delyone-de-paula-canedo-filho.pdf"
      }
    ]
  },
  {
  date: "2026-05-10",
  time: "",
  title: "Ajuizamento do Mandado de Segurança",
  category: "Judicial / início formal",
  description: "Data de organização e protocolo dos documentos relacionados ao Mandado de Segurança, incluindo petição inicial, comprovantes, contrato, representação e documentos de apoio.",
  impact: "Marca o início formal da reação judicial ao impedimento de exercício profissional e organiza a base documental do caso.",
  proofs: [
    {
      title: "Petição inicial do Mandado de Segurança",
      path: "linha-do-tempo/2026-05-10/judicial/peticao_inicial_mandado_seguranca.pdf"
    },
    {
      title: "Comprovante de distribuição do processo",
      path: "linha-do-tempo/2026-05-10/judicial/comprovante_distribuicao_processo.pdf"
    },
    {
      title: "Decisão judicial inicial",
      path: "linha-do-tempo/2026-05-10/judicial/decisao_judicial_inicial.pdf"
    },
    {
      title: "Comprovante de gratuidade de justiça",
      path: "linha-do-tempo/2026-05-10/comprovantes/comprovante_gratuidade_justica.pdf"
    },
    {
      title: "Documento de representação advocatícia",
      path: "linha-do-tempo/2026-05-10/representacao-legal/documento_representacao_advocacia.pdf"
    }
  ]
},
  {
    date: "2026-05-21",
    time: "",
    title: "Petição pessoal complementar protocolada",
    category: "Documento judicial / hipossuficiência",
    description: "Petição pessoal complementar relatando hipossuficiência financeira, cronologia dos fatos, tentativa de resolução e contestação da narrativa administrativa.",
    impact: "Documento-base para organização inicial da narrativa factual e probatória.",
    proofs: [
      {
        title: "Petição-adendo",
        path: "Linha do tempo principal/petição-adendo-delyone-de-paula-canedo-filho.pdf"
      }
    ]
  }
];

function makeMonth(year, monthIndex) {
  const monthNames = [
    "Janeiro","Fevereiro","Março","Abril","Maio","Junho",
    "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
  ];

  const firstDay = new Date(year, monthIndex, 1).getDay();
  const totalDays = new Date(year, monthIndex + 1, 0).getDate();

  let html = `
    <div class="month">
      <h2>${monthNames[monthIndex]} ${year}</h2>
      <div class="grid">
  `;

  ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"].forEach(d => {
    html += `<div class="label">${d}</div>`;
  });

  for (let i = 0; i < firstDay; i++) {
    html += `<div></div>`;
  }

  for (let day = 1; day <= totalDays; day++) {
    const date = `${year}-${String(monthIndex + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    const hasEvent = eventos.some(e => e.date === date);

    html += `
      <div class="day ${hasEvent ? "event" : ""}" onclick="showDate('${date}')">
        ${day}
      </div>
    `;
  }

  html += `</div></div>`;
  return html;
}

function showDate(date) {
  const selected = eventos.filter(e => e.date === date);
  const panel = document.getElementById("details");

  if (selected.length === 0) {
    panel.innerHTML = `
      <h2>${formatDate(date)}</h2>
      <p>Nenhum evento cadastrado ainda para esta data.</p>
      <p class="small">Quando houver prova, adicione um novo item no bloco <b>eventos</b> do HTML.</p>
    `;
    return;
  }

  panel.innerHTML = `
    <h2>${formatDate(date)}</h2>
    ${selected.map(e => `
      <div class="event-card">
        <h3>${e.title}</h3>
        <div class="tag">${e.category}</div>
        ${e.time ? `<p><b>Horário:</b> ${e.time}</p>` : ""}
        <p><b>Descrição:</b> ${e.description}</p>
        <p><b>Impacto:</b> ${e.impact}</p>

        <h4>Provas vinculadas</h4>
        ${e.proofs.map(p => `
          <p>📎 <a href="${p.path}" target="_blank">${p.title}</a></p>
        `).join("")}
      </div>
    `).join("")}
  `;
}

function formatDate(date) {
  const [y, m, d] = date.split("-");
  return `${d}/${m}/${y}`;
}

document.getElementById("calendar").innerHTML =
  makeMonth(2026, 3) + makeMonth(2026, 4);
</script>

</body>
</html>
